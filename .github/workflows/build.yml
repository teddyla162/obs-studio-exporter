name: Build Linux Binary
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Dependencies
        run: go mod tidy

      - name: Build
        run: GOOS=linux GOARCH=amd64 go build -o obs-exporter-linux

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: obs-exporter-binary
          path: obs-exporter-linux
